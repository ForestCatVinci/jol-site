<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Жол — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ice: #0B1017;
    --frost: #101820;
    --mist: #1A2B39;
    --slate: #4A6579;
    --deep: #7299AF;
    --ink: #C5D8E8;
    --white: #0E1822;
    --glass-border: rgba(26,43,57,0.6);
    --font: 'Inter', system-ui, -apple-system, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: var(--ice);
    color: var(--ink);
    overflow: hidden;
    cursor: none;
  }

  /* ── Cursor ── */
  .cursor {
    position: fixed; width: 8px; height: 8px;
    background: var(--deep); border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%,-50%);
    transition: width .2s, height .2s, background .2s;
  }
  .cursor-ring {
    position: fixed; width: 32px; height: 32px;
    border: 1px solid var(--mist); border-radius: 50%;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%,-50%);
    transition: width .25s, height .25s, border-color .2s;
  }
  body:has(a:hover) .cursor-ring,
  body:has(button:hover) .cursor-ring { width: 48px; height: 48px; border-color: var(--deep); }

  /* ── Snow ── */
  .snow-canvas {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0; opacity: 0.3;
  }

  /* ── Layout ── */
  .layout {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; height: 100vh;
  }

  /* ── Header ── */
  header {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px;
    background: rgba(11,16,23,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--glass-border);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .back-link {
    font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--slate); text-decoration: none;
    display: flex; align-items: center; gap: 6px; transition: color .2s;
  }
  .back-link:hover { color: var(--ink); }
  .back-link::before { content: '←'; }
  .divider-dot { width: 3px; height: 3px; background: var(--mist); border-radius: 50%; }
  .header-brand {
    font-size: 16px; font-weight: 500; letter-spacing: .04em;
    color: var(--ink); text-decoration: none;
  }
  .header-brand span { font-style: italic; color: var(--slate); font-weight: 300; }

  .header-center { display: flex; align-items: center; gap: 10px; }
  .advisor-avatar {
    width: 30px; height: 30px; background: var(--mist); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; color: var(--deep); flex-shrink: 0;
  }
  .advisor-name { font-size: 11px; font-weight: 500; color: var(--ink); line-height: 1.2; }
  .advisor-status {
    font-size: 10px; color: var(--slate);
    display: flex; align-items: center; gap: 5px; margin-top: 2px;
  }
  .online-dot {
    width: 5px; height: 5px; background: var(--deep); border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .header-action {
    font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--slate); background: none;
    border: 1px solid var(--glass-border); padding: 7px 14px;
    cursor: none; transition: all .2s; font-family: var(--font);
  }
  .header-action:hover { color: var(--ink); border-color: var(--mist); }

  /* ── Messages ── */
  .messages-wrap {
    flex: 1; overflow-y: auto;
    padding: 32px 0 20px; scroll-behavior: smooth;
  }
  .messages-wrap::-webkit-scrollbar { width: 3px; }
  .messages-wrap::-webkit-scrollbar-track { background: transparent; }
  .messages-wrap::-webkit-scrollbar-thumb { background: var(--mist); }

  .messages-inner {
    max-width: 760px; margin: 0 auto;
    padding: 0 24px; display: flex; flex-direction: column; gap: 18px;
  }

  /* ── Day marker ── */
  .day-marker {
    display: flex; align-items: center; gap: 14px; margin: 4px 0;
  }
  .day-marker::before,.day-marker::after {
    content:''; flex:1; height:1px; background: var(--mist);
  }
  .day-marker span {
    font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--slate);
  }

  /* ── Message row ── */
  .msg-row { display: flex; gap: 10px; align-items: flex-start; }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 500; flex-shrink: 0; margin-top: 2px;
  }
  .msg-row.bot .msg-avatar { background: var(--mist); color: var(--deep); }
  .msg-row.user .msg-avatar { background: var(--frost); color: var(--slate); }

  .msg-content {
    flex: 1; max-width: 82%;
    display: flex; flex-direction: column; gap: 5px;
  }
  .msg-row.user .msg-content { align-items: flex-end; }

  /* ── Plain bubble ── */
  .bubble {
    padding: 10px 14px; font-size: 12px; line-height: 1.7; font-weight: 300;
  }
  .msg-row.bot .bubble {
    background: var(--white); border: 1px solid var(--glass-border); color: var(--ink);
  }
  .msg-row.user .bubble {
    background: var(--deep); color: var(--frost);
  }

  .msg-time { font-size: 9px; letter-spacing: .06em; color: var(--slate); padding: 0 2px; }

  /* ── Structured card ── */
  .struct-card {
    background: var(--white); border: 1px solid var(--glass-border);
    padding: 16px; display: flex; flex-direction: column; gap: 12px;
  }
  .struct-intro { font-size: 12px; line-height: 1.7; font-weight: 300; color: var(--ink); }
  .struct-title {
    font-size: 10px; font-weight: 500; letter-spacing: .12em;
    text-transform: uppercase; color: var(--deep); margin-bottom: 4px;
  }

  /* ── Roadmap ── */
  .roadmap { display: flex; flex-direction: column; }
  .roadmap-step {
    display: flex; gap: 14px; padding: 10px 0;
    border-bottom: 1px solid var(--frost);
  }
  .roadmap-step:last-child { border-bottom: none; }
  .roadmap-period {
    min-width: 64px; font-size: 9px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--slate); padding-top: 2px; flex-shrink: 0;
  }
  .roadmap-action { font-size: 12px; color: var(--ink); font-weight: 400; margin-bottom: 3px; }
  .roadmap-detail { font-size: 11px; color: var(--slate); font-weight: 300; }

  /* ── Mindmap ── */
  .mm-center {
    align-self: center; font-size: 13px; font-weight: 500;
    color: var(--ink); padding: 8px 20px;
    border: 1px solid var(--deep); text-align: center; margin-bottom: 4px;
  }
  .mm-branches { display: flex; flex-wrap: wrap; gap: 8px; }
  .mm-branch {
    flex: 1; min-width: 110px;
    border: 1px solid var(--mist); padding: 10px 12px;
  }
  .mm-branch-label {
    font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--deep); margin-bottom: 7px; font-weight: 500;
  }
  .mm-branch ul { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .mm-branch li {
    font-size: 11px; color: var(--slate); font-weight: 300;
    padding-left: 8px; border-left: 1px solid var(--mist); line-height: 1.5;
  }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    text-align: left; padding: 7px 12px;
    background: var(--frost); color: var(--deep);
    font-size: 9px; letter-spacing: .1em; text-transform: uppercase; font-weight: 500;
    border-bottom: 1px solid var(--mist);
  }
  .data-table td {
    padding: 8px 12px; font-size: 11px; font-weight: 300;
    color: var(--ink); border-bottom: 1px solid var(--frost);
  }
  .data-table tr:last-child td { border-bottom: none; }

  /* ── Sources ── */
  .sources {
    display: flex; flex-wrap: wrap; gap: 5px;
    padding-top: 10px; border-top: 1px solid var(--mist);
  }
  .source-link {
    font-size: 9px; letter-spacing: .06em; color: var(--deep);
    text-decoration: none; border: 1px solid var(--mist);
    padding: 3px 8px; transition: all .2s;
  }
  .source-link:hover { color: var(--ink); border-color: var(--deep); }

  /* ── Typing indicator ── */
  .typing-row { display: flex; gap: 10px; align-items: flex-start; }
  .typing-indicator {
    display: flex; gap: 4px; align-items: center;
    padding: 10px 14px; background: var(--white);
    border: 1px solid var(--glass-border); width: fit-content;
  }
  .typing-indicator span {
    width: 4px; height: 4px; background: var(--slate);
    border-radius: 50%; animation: typingDot 1.4s ease-in-out infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: .2s; }
  .typing-indicator span:nth-child(3) { animation-delay: .4s; }
  @keyframes typingDot {
    0%,60%,100%{transform:translateY(0);opacity:.4}
    30%{transform:translateY(-4px);opacity:1}
  }

  /* ── Suggestion chips ── */
  .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 2px; }
  .chip {
    font-size: 10px; letter-spacing: .06em; padding: 5px 12px;
    border: 1px solid var(--mist); color: var(--deep); background: none;
    cursor: none; transition: all .2s; font-family: var(--font);
  }
  .chip:hover { background: var(--deep); color: var(--frost); border-color: var(--deep); }

  /* ── Input bar ── */
  .input-bar {
    flex-shrink: 0; padding: 16px 24px 24px;
    background: rgba(11,16,23,0.92); backdrop-filter: blur(12px);
    border-top: 1px solid var(--glass-border);
  }
  .input-inner { max-width: 760px; margin: 0 auto; }
  .input-box {
    display: flex; align-items: flex-end;
    border: 1px solid var(--mist); background: var(--white);
    transition: border-color .2s;
  }
  .input-box:focus-within { border-color: var(--deep); }
  .input-box textarea {
    flex: 1; background: none; border: none; outline: none;
    padding: 12px 16px; font-family: var(--font); font-size: 12px;
    color: var(--ink); font-weight: 300; resize: none;
    min-height: 44px; max-height: 140px; line-height: 1.6;
  }
  .input-box textarea::placeholder { color: var(--slate); }
  .input-actions { display: flex; align-items: center; gap: 4px; padding: 7px 8px; }
  .lang-toggle {
    font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--slate); background: none; border: 1px solid var(--frost);
    padding: 5px 9px; cursor: none; transition: all .2s; font-family: var(--font);
  }
  .lang-toggle:hover { color: var(--ink); border-color: var(--mist); }
  .send-btn {
    width: 32px; height: 32px; background: var(--deep); color: var(--frost);
    border: none; cursor: none; display: flex; align-items: center;
    justify-content: center; font-size: 14px; transition: background .2s; flex-shrink: 0;
  }
  .send-btn:hover { background: var(--ink); color: var(--frost); }
  .send-btn:disabled { background: var(--mist); color: var(--slate); }
  .input-hint {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 7px; padding: 0 2px;
  }
  .hint-text { font-size: 9px; letter-spacing: .08em; color: var(--slate); }
  .char-count { font-size: 9px; letter-spacing: .06em; color: var(--slate); }

  /* ── Empty state ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 48px 24px; text-align: center; gap: 0;
  }
  .empty-logo {
    font-size: 40px; font-weight: 300; color: var(--ink);
    line-height: 1; margin-bottom: 8px; letter-spacing: -.01em;
  }
  .empty-logo span { font-style: italic; color: var(--slate); }
  .empty-tagline {
    font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--slate); margin-bottom: 40px;
  }
  .empty-prompts {
    display: grid; grid-template-columns: repeat(2,1fr);
    gap: 6px; max-width: 520px; width: 100%;
  }
  .prompt-card {
    background: var(--white); border: 1px solid var(--glass-border);
    padding: 14px 16px; text-align: left; cursor: none;
    transition: border-color .2s; font-family: var(--font);
  }
  .prompt-card:hover { border-color: var(--mist); }
  .prompt-card-label {
    font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--slate); margin-bottom: 5px;
  }
  .prompt-card-text { font-size: 11px; color: var(--deep); line-height: 1.6; font-weight: 300; }

  @media (max-width: 640px) {
    header { padding: 12px 16px; }
    .header-center { display: none; }
    .messages-inner { padding: 0 14px; }
    .input-bar { padding: 12px 14px 18px; }
    .empty-prompts { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<canvas class="snow-canvas" id="snow"></canvas>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="layout">

  <header>
    <div class="header-left">
      <a href="jol-website.html" class="back-link">Back</a>
      <div class="divider-dot"></div>
      <a href="jol-website.html" class="header-brand">Жол <span>/ path</span></a>
    </div>
    <div class="header-center">
      <div class="advisor-avatar">Ж</div>
      <div>
        <div class="advisor-name">Жол — your advisor</div>
        <div class="advisor-status">
          <div class="online-dot"></div>
          Қазақша · Русский · English
        </div>
      </div>
    </div>
    <div>
      <button class="header-action" id="clearBtn">New chat</button>
    </div>
  </header>

  <div class="messages-wrap" id="messagesWrap">
    <div class="messages-inner" id="messagesInner">
      <div class="empty-state" id="emptyState">
        <div class="empty-logo">Жол <span>/ path</span></div>
        <div class="empty-tagline">Your AI advisor for university &amp; career</div>
        <div class="empty-prompts">
          <button class="prompt-card" onclick="fillPrompt('I don\'t know what to study after school')">
            <div class="prompt-card-label">Direction</div>
            <div class="prompt-card-text">I don't know what to study after school</div>
          </button>
          <button class="prompt-card" onclick="fillPrompt('What grants exist for students from my region?')">
            <div class="prompt-card-label">Funding</div>
            <div class="prompt-card-text">What grants exist for students from my region?</div>
          </button>
          <button class="prompt-card" onclick="fillPrompt('Build me a month-by-month plan for ENT preparation')">
            <div class="prompt-card-label">Roadmap</div>
            <div class="prompt-card-text">Build me a month-by-month plan for ENT preparation</div>
          </button>
          <button class="prompt-card" onclick="fillPrompt('What career paths suit someone who likes math and technology?')">
            <div class="prompt-card-label">Career</div>
            <div class="prompt-card-text">What career paths suit someone who likes math and technology?</div>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-inner">
      <div class="input-box">
        <textarea id="chatInput" placeholder="Ask anything about your future..." rows="1"></textarea>
        <div class="input-actions">
          <button class="lang-toggle" id="langBtn">KZ</button>
          <button class="send-btn" id="sendBtn" disabled>↑</button>
        </div>
      </div>
      <div class="input-hint">
        <span class="hint-text">Enter to send · Shift+Enter new line</span>
        <span class="char-count" id="charCount">0 / 500</span>
      </div>
    </div>
  </div>

</div>

<script>
// ── Cursor ──────────────────────────────────────────────────────────────────
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursorRing');
let mx=0, my=0, rx=0, ry=0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx+'px'; cursor.style.top = my+'px';
});
(function animRing() {
  rx += (mx-rx)*0.12; ry += (my-ry)*0.12;
  ring.style.left = rx+'px'; ring.style.top = ry+'px';
  requestAnimationFrame(animRing);
})();

// ── Snow ─────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('snow');
const ctx    = canvas.getContext('2d');
function resizeCanvas() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
const flakes = Array.from({length:45}, () => ({
  x: Math.random()*canvas.width, y: Math.random()*canvas.height,
  r: Math.random()*2+0.5, speed: Math.random()*0.4+0.1,
  drift: Math.random()*0.2-0.1, opacity: Math.random()*0.35+0.06
}));
(function drawSnow() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  flakes.forEach(f => {
    ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(100,130,160,${f.opacity})`; ctx.fill();
    f.y+=f.speed; f.x+=f.drift;
    if(f.y>canvas.height){f.y=-5;f.x=Math.random()*canvas.width;}
    if(f.x>canvas.width)f.x=0; if(f.x<0)f.x=canvas.width;
  });
  requestAnimationFrame(drawSnow);
})();

// ── Chat logic ────────────────────────────────────────────────────────────────
const input        = document.getElementById('chatInput');
const sendBtn      = document.getElementById('sendBtn');
const messagesInner= document.getElementById('messagesInner');
const charCount    = document.getElementById('charCount');
const langBtn      = document.getElementById('langBtn');
const clearBtn     = document.getElementById('clearBtn');
const wrap         = document.getElementById('messagesWrap');

const WEBHOOK_URL = 'https://multistory-jackelyn-aggadic.ngrok-free.dev/webhook/5c8d5ff3-42be-49ef-90cd-d14073ee6024';

const langs = ['KZ','RU','EN'];
let langIdx = 0;
langBtn.addEventListener('click', () => { langIdx=(langIdx+1)%langs.length; langBtn.textContent=langs[langIdx]; });

input.addEventListener('input', () => {
  input.style.height='auto';
  input.style.height=Math.min(input.scrollHeight,140)+'px';
  const len=input.value.length;
  charCount.textContent=len+' / 500';
  sendBtn.disabled = len===0 || len>500;
});
input.addEventListener('keydown', e => {
  if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); if(!sendBtn.disabled) send(); }
});
sendBtn.addEventListener('click', send);
clearBtn.addEventListener('click', clearChat);

// Per-load session ID
const sessionId = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);

// Persistent user ID
let user_id;
try {
  user_id = localStorage.getItem('jol_user_id');
  if (!user_id) {
    user_id = crypto.randomUUID ? crypto.randomUUID() : 'anon-'+Date.now();
    localStorage.setItem('jol_user_id', user_id);
  }
} catch(e) { user_id='anon-'+Date.now(); }

function now() {
  return new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
function hideEmpty() {
  const e=document.getElementById('emptyState'); if(e) e.remove();
}
function scrollBottom() { wrap.scrollTop=wrap.scrollHeight; }

function escapeHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(str) {
  return String(str||'').replace(/"/g,'&quot;');
}

// ── JSON parsing ─────────────────────────────────────────────────────────────
function tryParseJSON(str) {
  if (!str) return null;
  try { return JSON.parse(str); } catch(e) {}
  const cb = str.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (cb) try { return JSON.parse(cb[1].trim()); } catch(e) {}
  const obj = str.match(/\{[\s\S]*\}/);
  if (obj) try { return JSON.parse(obj[0]); } catch(e) {}
  return null;
}

// ── Structured renderers ──────────────────────────────────────────────────────
function buildSources(sources) {
  if (!sources || !sources.length) return '';
  const links = sources.map(s =>
    `<a href="${escapeAttr(s.url)}" target="_blank" rel="noopener" class="source-link">${escapeHtml(s.title||s.url)}</a>`
  ).join('');
  return `<div class="sources">${links}</div>`;
}

function buildRoadmap(data) {
  const steps = (data.steps||[]).map(s => `
    <div class="roadmap-step">
      <div class="roadmap-period">${escapeHtml(s.period)}</div>
      <div>
        <div class="roadmap-action">${escapeHtml(s.action)}</div>
        ${s.detail?`<div class="roadmap-detail">${escapeHtml(s.detail)}</div>`:''}
      </div>
    </div>`).join('');
  return `
    <div class="struct-title">${escapeHtml(data.title||'Roadmap')}</div>
    <div class="roadmap">${steps}</div>
    ${buildSources(data.sources)}`;
}

function buildMindmap(data) {
  const branches = (data.branches||[]).map(b => `
    <div class="mm-branch">
      <div class="mm-branch-label">${escapeHtml(b.label)}</div>
      <ul>${(b.items||[]).map(i=>`<li>${escapeHtml(i)}</li>`).join('')}</ul>
    </div>`).join('');
  return `
    <div class="struct-title">${escapeHtml(data.title||'Mind Map')}</div>
    <div class="mm-center">${escapeHtml(data.center||'')}</div>
    <div class="mm-branches">${branches}</div>
    ${buildSources(data.sources)}`;
}

function buildTable(data) {
  const headers = (data.headers||[]).map(h=>`<th>${escapeHtml(h)}</th>`).join('');
  const rows    = (data.rows||[]).map(r=>
    `<tr>${r.map(c=>`<td>${escapeHtml(c)}</td>`).join('')}</tr>`
  ).join('');
  return `
    <div class="struct-title">${escapeHtml(data.title||'Table')}</div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr>${headers}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${buildSources(data.sources)}`;
}

function buildCard(data) {
  if (data.type === 'text') {
    return { isCard: false, html: escapeHtml(data.message||'') };
  }
  let inner = '';
  if (data.type === 'roadmap') inner = buildRoadmap(data);
  else if (data.type === 'mindmap') inner = buildMindmap(data);
  else if (data.type === 'table') inner = buildTable(data);
  else return { isCard: false, html: escapeHtml(JSON.stringify(data)) };
  const intro = data.message ? `<div class="struct-intro">${escapeHtml(data.message)}</div>` : '';
  return { isCard: true, html: `<div class="struct-card">${intro}${inner}</div>` };
}

// ── Add message ───────────────────────────────────────────────────────────────
function addMessage(content, role) {
  hideEmpty();
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const initials = role==='bot' ? 'Ж' : 'Вы';

  let bodyHtml;
  if (role === 'bot') {
    const parsed = tryParseJSON(content);
    if (parsed) {
      const {isCard, html} = buildCard(parsed);
      bodyHtml = isCard ? html : `<div class="bubble">${html}</div>`;
    } else {
      bodyHtml = `<div class="bubble">${escapeHtml(content)}</div>`;
    }
  } else {
    bodyHtml = `<div class="bubble">${escapeHtml(content)}</div>`;
  }

  row.innerHTML = `
    <div class="msg-avatar">${initials}</div>
    <div class="msg-content">
      ${bodyHtml}
      <div class="msg-time">${now()}</div>
    </div>`;
  messagesInner.appendChild(row);
  scrollBottom();
  return row;
}

function addTyping() {
  hideEmpty();
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.innerHTML = `
    <div class="msg-avatar" style="width:26px;height:26px;border-radius:50%;background:var(--mist);
      display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--deep);flex-shrink:0;margin-top:2px;">Ж</div>
    <div class="typing-indicator"><span></span><span></span><span></span></div>`;
  messagesInner.appendChild(row);
  scrollBottom();
  return row;
}

function fillPrompt(text) {
  input.value=text; input.dispatchEvent(new Event('input')); input.focus();
}

// ── Send ──────────────────────────────────────────────────────────────────────
let isWaiting = false;

async function send() {
  const text = input.value.trim();
  if (!text || isWaiting) return;

  addMessage(text, 'user');
  input.value=''; input.style.height='auto';
  charCount.textContent='0 / 500'; sendBtn.disabled=true; isWaiting=true;

  const typingRow = addTyping();

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'ngrok-skip-browser-warning':'true' },
      body: JSON.stringify({ chatInput: text, sessionId, user_id })
    });

    const rawText = await res.text();
    typingRow.remove();
    console.log('[Жол] raw:', rawText);

    let reply;
    try {
      const raw  = JSON.parse(rawText);
      const item = Array.isArray(raw) ? raw[0] : raw;
      const data = item?.json ?? item;
      reply = data?.output ?? (typeof data==='string' ? data : null);
    } catch(e) {
      reply = rawText.trim() || null;
    }
    addMessage(reply || '{"type":"text","message":"No response received."}', 'bot');
  } catch(err) {
    typingRow.remove();
    addMessage('{"type":"text","message":"Connection error — please try again."}', 'bot');
  }

  isWaiting = false;
}

// ── Clear chat ────────────────────────────────────────────────────────────────
function clearChat() {
  messagesInner.innerHTML = '';
  const empty = document.createElement('div');
  empty.id='emptyState'; empty.className='empty-state';
  empty.innerHTML = `
    <div class="empty-logo">Жол <span>/ path</span></div>
    <div class="empty-tagline">Your AI advisor for university &amp; career</div>
    <div class="empty-prompts">
      <button class="prompt-card" onclick="fillPrompt('I don\\'t know what to study after school')">
        <div class="prompt-card-label">Direction</div>
        <div class="prompt-card-text">I don't know what to study after school</div>
      </button>
      <button class="prompt-card" onclick="fillPrompt('What grants exist for students from my region?')">
        <div class="prompt-card-label">Funding</div>
        <div class="prompt-card-text">What grants exist for students from my region?</div>
      </button>
      <button class="prompt-card" onclick="fillPrompt('Build me a month-by-month plan for ENT preparation')">
        <div class="prompt-card-label">Roadmap</div>
        <div class="prompt-card-text">Build me a month-by-month plan for ENT preparation</div>
      </button>
      <button class="prompt-card" onclick="fillPrompt('What career paths suit someone who likes math and technology?')">
        <div class="prompt-card-label">Career</div>
        <div class="prompt-card-text">What career paths suit someone who likes math and technology?</div>
      </button>
    </div>`;
  messagesInner.appendChild(empty);
}
</script>
