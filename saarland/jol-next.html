<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Жол — You're in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ice: #0B1017;
    --frost: #101820;
    --mist: #1A2B39;
    --slate: #4A6579;
    --deep: #7299AF;
    --ink: #C5D8E8;
    --white: #0E1822;
    --glass-border: rgba(26,43,57,0.6);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'DM Mono', monospace;
    background: var(--ice);
    color: var(--ink);
    cursor: none;
  }

  .cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--deep);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
  }
  .cursor-ring {
    position: fixed;
    width: 32px; height: 32px;
    border: 1px solid var(--mist);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: width 0.25s, height 0.25s, border-color 0.2s;
  }
  body:has(a:hover) .cursor-ring,
  body:has(button:hover) .cursor-ring { width: 48px; height: 48px; border-color: var(--deep); }

  .snow-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.35;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    padding: 20px 48px;
    background: rgba(11,16,23,0.88);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--glass-border);
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--ink);
    text-decoration: none;
  }
  .nav-logo span { font-style: italic; color: var(--slate); }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
  }

  .container {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
    animation: fadeUp 0.6s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .mark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 64px;
    font-weight: 300;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 28px;
  }

  .eyebrow {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--slate);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .eyebrow::before, .eyebrow::after {
    content: '';
    display: block;
    width: 20px; height: 1px;
    background: var(--mist);
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(30px, 5vw, 42px);
    font-weight: 300;
    color: var(--ink);
    line-height: 1.15;
    margin-bottom: 16px;
  }
  .headline em { font-style: italic; color: var(--slate); }

  .sub {
    font-size: 11px;
    color: var(--slate);
    line-height: 1.8;
    font-weight: 300;
    max-width: 360px;
    margin-bottom: 52px;
  }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }

  .btn-primary {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--frost);
    border: none;
    padding: 18px 24px;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.2s;
    cursor: none;
  }
  .btn-primary:hover { background: var(--deep); }
  .btn-primary .btn-icon { font-size: 14px; }

  .btn-secondary {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: none;
    color: var(--deep);
    border: 1px solid var(--mist);
    padding: 18px 24px;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
    cursor: none;
  }
  .btn-secondary:hover {
    border-color: var(--deep);
    color: var(--ink);
  }
  .btn-secondary .btn-icon { font-size: 14px; }

  .divider-row {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
  }
  .divider-row::before, .divider-row::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--mist);
  }
  .divider-row span {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--slate);
  }

  .skip-link {
    margin-top: 28px;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--slate);
    text-decoration: none;
    transition: color 0.2s;
  }
  .skip-link:hover { color: var(--ink); }

  @media (max-width: 480px) {
    nav { padding: 16px 20px; }
  }
</style>
</head>
<body>

<canvas class="snow-canvas" id="snow"></canvas>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a href="jol-website.html" class="nav-logo">Жол <span>/ path</span></a>
</nav>

<div class="page">
  <div class="container">

    <div class="mark">Ж</div>

    <div class="eyebrow">Account created</div>
    <h1 class="headline">You're on the <em>path</em></h1>
    <p class="sub">Choose how you'd like to begin — chat with Жол right now, or connect Telegram to get reminders and updates along the way.</p>

    <div class="actions">
      <a href="jol-chat.html" class="btn-primary">
        <span class="btn-icon">↗</span> Start chat
      </a>

      <div class="divider-row"><span>or</span></div>

      <a href="https://t.me/JolKZbot" class="btn-secondary" target="_blank" rel="noopener">
        <span class="btn-icon">✈</span> Set up Telegram
      </a>
    </div>

    <a href="jol-website.html" class="skip-link">Back to home</a>

  </div>
</div>

<script>
// Cursor
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
});
(function animRing() {
  rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
  requestAnimationFrame(animRing);
})();

// Snow
const canvas = document.getElementById('snow');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);
const flakes = Array.from({length: 45}, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  r: Math.random() * 2.5 + 0.5,
  speed: Math.random() * 0.5 + 0.15,
  drift: Math.random() * 0.25 - 0.12,
  opacity: Math.random() * 0.4 + 0.08
}));
(function drawSnow() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  flakes.forEach(f => {
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(100,130,160,${f.opacity})`;
    ctx.fill();
    f.y += f.speed; f.x += f.drift;
    if (f.y > canvas.height) { f.y = -5; f.x = Math.random() * canvas.width; }
    if (f.x > canvas.width) f.x = 0;
    if (f.x < 0) f.x = canvas.width;
  });
  requestAnimationFrame(drawSnow);
})();
</script>
</body>
</html>
